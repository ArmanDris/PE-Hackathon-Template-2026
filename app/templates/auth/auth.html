<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    <style>
        body {
            background: #111;
            color: #eee;
            font-family: Arial, sans-serif;
            display: flex;
            height: 100vh;
            align-items: center;
            justify-content: center;
        }

        .box {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 8px;
            width: 300px;
            box-shadow: 0 0 10px #000;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background: #222;
            border: 1px solid #333;
            color: #eee;
        }

        button {
            margin-top: 15px;
            width: 100%;
            padding: 10px;
            background: #4CAF50;
            border: none;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #45a049;
        }

        .error {
            color: red;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="box">
        <h2>Admin Login</h2>

        <form method="POST" action="/admin/auth">
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}
    </div>
</body>
</html>
